<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kmcuts Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
    <link href="admin.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <span class="brand-text">
                <span class="white-text">km</span>
                <span class="pink-text">cuts</span>
            </span>
        </div>
        <div class="navbar-end">
            <button onclick="logout()" class="logout-button">Logout</button>
        </div>
    </nav>

    <div class="admin-container">
        <h1>Admin Panel</h1>
        <!-- Add your admin controls here -->
    </div>

    <script>
        // Check login status
        if (!sessionStorage.getItem('adminLoggedIn')) {
            window.location.href = 'login.html';
        }

        function logout() {
            sessionStorage.removeItem('adminLoggedIn');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
